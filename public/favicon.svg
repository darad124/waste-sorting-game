<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <!-- Background gradient: deep eco-green -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c29"/>
      <stop offset="100%" stop-color="#1a6b3a"/>
    </linearGradient>
    <!-- Bin body gradient -->
    <linearGradient id="binGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <!-- Lid gradient -->
    <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <!-- Leaf shine gradient -->
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <!-- Subtle inner shadow filter -->
    <filter id="binShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#052e16" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded background pill -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.3"/>

  <!-- === RECYCLING BIN === -->
  <!-- Lid -->
  <rect x="17" y="20" width="30" height="5" rx="2.5" fill="url(#lidGrad)" filter="url(#binShadow)"/>
  <!-- Lid handle -->
  <rect x="27" y="16" width="10" height="5" rx="2.5" fill="#86efac"/>
  <!-- Bin body (trapezoid via polygon) -->
  <polygon points="19,25 45,25 42,49 22,49" fill="url(#binGrad)" filter="url(#binShadow)"/>
  <!-- Bin body side sheen -->
  <polygon points="19,25 24,25 21,49 19,49" fill="#86efac" opacity="0.25"/>

  <!-- Vertical ribs on bin -->
  <line x1="30" y1="26" x2="30" y2="48" stroke="#052e16" stroke-width="1" opacity="0.15"/>
  <line x1="34" y1="26" x2="34" y2="48" stroke="#052e16" stroke-width="1" opacity="0.15"/>

  <!-- === RECYCLING ARROWS (small, centered on bin) === -->
  <g transform="translate(32,37) scale(0.7)" fill="none" stroke="#f0fdf4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top arrow -->
    <path d="M0,-10 A10,10 0 0,1 8.66,-5"/>
    <polyline points="6,-2 8.66,-5 11.66,-5"/>
    <!-- Bottom-right arrow -->
    <path d="M8.66,-5 A10,10 0 0,1 0,10"/>
    <polyline points="2,7 0,10 -2,7"/>
    <!-- Bottom-left arrow -->
    <path d="M0,10 A10,10 0 0,1 -8.66,-5"/>
    <polyline points="-11,-5 -8.66,-5 -8.66,-2"/>
  </g>

  <!-- === LEAF accent (top right) === -->
  <g transform="translate(47,14) rotate(-30)">
    <ellipse cx="0" cy="0" rx="5" ry="8" fill="url(#leafGrad)" opacity="0.9"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#16a34a" stroke-width="0.8" opacity="0.6"/>
  </g>

</svg>